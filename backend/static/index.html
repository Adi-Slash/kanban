<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM MVP - Hello World</title>
    <style>
      body {
        margin: 0;
        font-family: Segoe UI, Arial, sans-serif;
        background: #f7f8fb;
        color: #032147;
      }
      main {
        max-width: 800px;
        margin: 64px auto;
        background: white;
        border: 1px solid rgba(3, 33, 71, 0.1);
        border-radius: 16px;
        padding: 24px;
      }
      h1 {
        margin-top: 0;
      }
      pre {
        background: #eef5fb;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello from static HTML</h1>
      <p>This page is served by FastAPI from a static file.</p>
      <p>API response from <code>/api/hello</code>:</p>
      <pre id="result">Loading...</pre>
    </main>
    <script>
      async function loadHello() {
        const target = document.getElementById("result");
        try {
          const response = await fetch("/api/hello");
          const data = await response.json();
          target.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          target.textContent = "Request failed: " + String(error);
        }
      }
      loadHello();
    </script>
  </body>
</html>
